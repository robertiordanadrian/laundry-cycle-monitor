<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LaundryHub</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Plan and pay for laundry cycles on connected washers and dryers."
    />
    <meta name="theme-color" content="#1f1f1f" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="mat-typography">
    <app-root>
      <div class="app-bootstrap-loader" role="status" aria-live="polite" aria-label="Loading LaundryHub">
        <span class="app-bootstrap-loader__dot"></span>
        <span class="app-bootstrap-loader__dot"></span>
        <span class="app-bootstrap-loader__dot"></span>
      </div>
    </app-root>
    <noscript>
      <p style="padding: 1rem; font-family: sans-serif;">
        LaundryHub requires JavaScript to be enabled.
      </p>
    </noscript>
  </body>
</html>
